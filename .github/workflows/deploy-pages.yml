name: Deploy to Cloudflare Pages

on:
  push:
    branches: [Dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx @cloudflare/next-on-pages@1
        env:
          NODE_VERSION: '20'
          SITE_URL: https://spanishtvshows.com
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN_SPANISHTVSHOWS }}
          accountId: 555c6765a482638bb35788790f03e763
          command: pages deploy .vercel/output/static --project-name=spanishtvshows --branch=main
